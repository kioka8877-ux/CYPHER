name: "Build GAMMA Docker Image"

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: F03_GAMMA/CODEBASE
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cypher-gamma:latest
            ghcr.io/${{ github.repository_owner }}/cypher-gamma:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          echo "✅ Image pushed: ghcr.io/${{ github.repository_owner }}/cypher-gamma:latest"
          docker pull ghcr.io/${{ github.repository_owner }}/cypher-gamma:latest
          docker run --rm ghcr.io/${{ github.repository_owner }}/cypher-gamma:latest \
            sh -c "ls /app/public/fonts/ && chromium --version && echo OK"
