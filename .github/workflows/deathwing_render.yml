name: DEATHWING — Manim Render

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "CYPHER run_id (ex: CYP_20260621_1200)"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (cairo + pango + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev libpangocairo-1.0-0 \
            libglib2.0-dev pkg-config build-essential \
            ffmpeg texlive-latex-base texlive-fonts-recommended \
            fonts-dejavu-core
          pip install --upgrade pip wheel

      - name: Install Manim + ATLAS
        run: |
          pip install manim==0.20.1
          pip install geopandas matplotlib requests Pillow
          pip install git+https://github.com/kioka8877-ux/ATLAS.git || true

      - name: Download render_spec.json + visuels from release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p render_workspace/visuals
          # Télécharger render_spec.json
          gh release download "${{ inputs.run_id }}" \
            --repo ${{ github.repository }} \
            --pattern "render_spec.json" \
            --dir render_workspace
          # Télécharger les visuels (PNG/JPG/GIF/MP4) s'ils existent
          gh release download "${{ inputs.run_id }}" \
            --repo ${{ github.repository }} \
            --pattern "*.png" \
            --dir render_workspace/visuals || true
          gh release download "${{ inputs.run_id }}" \
            --repo ${{ github.repository }} \
            --pattern "*.jpg" \
            --dir render_workspace/visuals || true
          gh release download "${{ inputs.run_id }}" \
            --repo ${{ github.repository }} \
            --pattern "*.gif" \
            --dir render_workspace/visuals || true
          gh release download "${{ inputs.run_id }}" \
            --repo ${{ github.repository }} \
            --pattern "*.mp4" \
            --dir render_workspace/visuals || true
          echo "[DEATHWING] Assets téléchargés :"
          ls -lh render_workspace/
          ls -lh render_workspace/visuals/ || true

      - name: Copy CypherScene.py to render workspace
        run: |
          cp F03_DEATHWING/CODEBASE/CypherScene.py render_workspace/CypherScene.py

      - name: Render CypherScene
        run: |
          cd render_workspace
          python -m manim CypherScene.py CypherScene \
            --format mp4 \
            --fps 30 \
            --width 1080 --height 1920 \
            --media_dir ./media \
            --disable_caching \
            -q h
          echo "[DEATHWING] Fichiers MP4 après render :"
          find ./media -name "*.mp4" -ls 2>/dev/null || echo "Aucun MP4"
          # 1. Cherche le fichier final (hors partial)
          RENDERED=$(find ./media -name "*.mp4" 2>/dev/null | grep -v partial_movie_files | head -1)
          # 2. Fallback : concatène les partiels via FFmpeg
          if [ -z "$RENDERED" ]; then
            PARTIALS=$(find ./media -name "*.mp4" 2>/dev/null | sort)
            if [ -n "$PARTIALS" ]; then
              echo "$PARTIALS" | while read f; do echo "file \'$f\'"; done > /tmp/concat_list.txt
              ffmpeg -f concat -safe 0 -i /tmp/concat_list.txt -c copy ./media/cypher_final.mp4 -y
              RENDERED=./media/cypher_final.mp4
              echo "[DEATHWING] Partiels concaténés → $RENDERED"
            fi
          fi
          ABS_RENDERED="render_workspace/${RENDERED#./}"
          echo "RENDERED=$ABS_RENDERED" >> $GITHUB_ENV
          echo "[DEATHWING] RENDERED=$RENDERED"
          if [ -z "$ABS_RENDERED" ]; then echo "[DEATHWING] ERREUR: aucun MP4 produit" && exit 1; fi

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-render-${{ inputs.run_id }}
          path: ${{ env.RENDERED }}
          retention-days: 7

      - name: Upload video to release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release upload "${{ inputs.run_id }}" \
            "${{ env.RENDERED }}" \
            --repo ${{ github.repository }} \
            --clobber
          echo "[DEATHWING] Video → release cyp-${{ inputs.run_id }}"


