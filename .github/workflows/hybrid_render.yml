name: "CYPHER — Hybrid Render (CYPHER × GAMMA)"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Release tag for assets"
        default: "CYP_HYBRID_20260703"

permissions:
  contents: write
  packages: read

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Render CYPHER travel chunks (MapLibre — runner nu)
  # ═══════════════════════════════════════════════════════════════
  render-cypher:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        chunk: [1, 3, 5, 7, 9]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        working-directory: F03_DEATHWING/CODEBASE
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Download assets
        working-directory: F03_DEATHWING/CODEBASE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          cp ../../SHARED/hybrid_spec.json assets/
          curl -sL -o assets/us_states.geojson \
            "https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json"

      - name: Render chunk ${{ matrix.chunk }}
        working-directory: F03_DEATHWING/CODEBASE
        run: |
          node render_hybrid.js \
            --spec assets/hybrid_spec.json \
            --chunk ${{ matrix.chunk }} \
            --output chunk_${{ matrix.chunk }}.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk }}
          path: F03_DEATHWING/CODEBASE/chunk_${{ matrix.chunk }}.mp4

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Render GAMMA story chunks (Remotion — Docker)
  # ═══════════════════════════════════════════════════════════════
  render-gamma:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ghcr.io/kioka8877-ux/cypher-gamma:latest
      env:
        REMOTION_CHROME_EXECUTABLE: /usr/bin/chromium
    strategy:
      matrix:
        chunk: [0, 2, 4, 6, 8]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Link node_modules + fonts from Docker image
        working-directory: F03_GAMMA/CODEBASE
        run: |
          ln -sf /app/node_modules node_modules
          mkdir -p public/fonts
          cp /app/public/fonts/*.woff2 public/fonts/
          echo "=== Fonts copied ==="
          ls -la public/fonts/

      - name: Prepare assets (GitHub API — auth-safe downloads)
        working-directory: F03_GAMMA/CODEBASE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.run_id }}
          REPO_FULL: ${{ github.repository }}
        run: |
          mkdir -p public/images
          cp ../../SHARED/hybrid_spec.json public/

          # ── Get release asset IDs via GitHub API ──
          echo "=== Fetching release asset list ==="
          ASSETS_JSON=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_FULL/releases/tags/$RELEASE_TAG")

          # ── Helper: download asset by name via API (handles auth + redirect) ──
          download_asset() {
            local asset_name="$1"
            local output_path="$2"
            local asset_id=$(echo "$ASSETS_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if a['name'] == '$asset_name':
                  print(a['id'])
                  break
          ")
            if [ -z "$asset_id" ]; then
              echo "  ❌ Asset '$asset_name' not found in release $RELEASE_TAG"
              return 1
            fi
            echo "  Downloading $asset_name (asset ID: $asset_id)..."
            curl -sL \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/octet-stream" \
              -o "$output_path" \
              "https://api.github.com/repos/$REPO_FULL/releases/assets/$asset_id"
            if [ -s "$output_path" ]; then
              echo "    ✅ $asset_name: $(du -h "$output_path" | cut -f1)"
              return 0
            else
              echo "    ❌ $asset_name: download failed (empty file)"
              return 1
            fi
          }

          # ── Download images.zip (FATAL if missing) ──
          echo ""
          echo "=== Downloading images.zip ==="
          if ! download_asset "images.zip" "public/images.zip"; then
            echo "FATAL: images.zip is required for GAMMA render"
            exit 1
          fi
          unzip -o public/images.zip -d public/images/
          echo "  Unzipped images:"
          ls -la public/images/

          # ── Download audio_clean.mp3 (optional but warned) ──
          echo ""
          echo "=== Downloading audio_clean.mp3 ==="
          download_asset "audio_clean.mp3" "public/audio_clean.mp3" || echo "  ⚠️ No audio — video will be silent"

          # ── Download timing.json (optional but warned) ──
          echo ""
          echo "=== Downloading timing.json ==="
          download_asset "timing.json" "public/timing.json" || echo "  ⚠️ No timing — subtitles will use full text"

          # ── Final inventory ──
          echo ""
          echo "=== Final asset inventory ==="
          echo "public/ contents:"
          ls -la public/
          echo ""
          echo "public/images/ contents:"
          ls -la public/images/
          echo ""
          echo "public/fonts/ contents:"
          ls -la public/fonts/

      - name: Render gamma chunk ${{ matrix.chunk }}
        working-directory: F03_GAMMA/CODEBASE
        run: |
          CHUNK_ID=${{ matrix.chunk }}
          START_FRAME=$(python3 -c "
          import json
          spec = json.load(open('public/hybrid_spec.json'))
          chunk = [c for c in spec['chunks'] if c['id']==$CHUNK_ID][0]
          fps = spec['meta']['fps']
          print(int(round(chunk['start'] * fps)))
          ")
          END_FRAME=$(python3 -c "
          import json
          spec = json.load(open('public/hybrid_spec.json'))
          chunk = [c for c in spec['chunks'] if c['id']==$CHUNK_ID][0]
          fps = spec['meta']['fps']
          print(int(round(chunk['end'] * fps)) - 1)
          ")
          FRAMES=$((END_FRAME - START_FRAME + 1))
          echo "Rendering chunk $CHUNK_ID: frames $START_FRAME to $END_FRAME ($FRAMES frames)"

          npx remotion render src/index.jsx CypherGamma chunk_${{ matrix.chunk }}.mp4 \
            --frames=$START_FRAME-$END_FRAME \
            --gl=swangle \
            --concurrency=2

      - uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk }}
          path: F03_GAMMA/CODEBASE/chunk_${{ matrix.chunk }}.mp4

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Assemble all chunks + remux audio (runner nu)
  # ═══════════════════════════════════════════════════════════════
  assemble:
    needs: [render-cypher, render-gamma]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          merge-multiple: true
          path: chunks/

      - name: List chunks
        run: ls -la chunks/

      - name: Download audio
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.run_id }}" \
            --pattern "audio_clean.mp3" --dir . || true

      - name: Concat chunks in hybrid_spec order
        run: |
          python3 << 'PYEOF'
          import json
          spec = json.load(open('SHARED/hybrid_spec.json'))
          with open('concat.txt', 'w') as f:
              for chunk in spec['chunks']:
                  cid = chunk['id']
                  path = f'chunks/chunk_{cid}.mp4'
                  f.write(f"file '{path}'\n")
          print('concat.txt written')
          PYEOF
          cat concat.txt
          ffmpeg -f concat -safe 0 -i concat.txt -c copy cypher_video_noaudio.mp4

      - name: Remux with audio
        run: |
          if [ -f audio_clean.mp3 ]; then
            ffmpeg -i cypher_video_noaudio.mp4 -i audio_clean.mp3 \
              -c:v copy -c:a aac -shortest cypher_final.mp4
          else
            cp cypher_video_noaudio.mp4 cypher_final.mp4
          fi
          ls -lh cypher_final.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-hybrid-final
          path: cypher_final.mp4
          retention-days: 7

      - name: Upload to release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.run_id }}" cypher_final.mp4 --clobber

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: F05 LUTHER — strip metadata (runner nu)
  # ═══════════════════════════════════════════════════════════════
  luther:
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - uses: actions/download-artifact@v4
        with:
          name: cypher-hybrid-final
          path: .

      - name: Strip metadata
        run: |
          echo "[LUTHER] Audit pre-strip:"
          ffprobe -v quiet -print_format json -show_format cypher_final.mp4 | \
            python3 -c "import json,sys; d=json.load(sys.stdin); tags=d.get('format',{}).get('tags',{}); print(json.dumps(tags, indent=2))"

          echo "[LUTHER] Stripping..."
          ffmpeg -i cypher_final.mp4 -c copy -map_metadata -1 -fflags +bitexact clean_final.mp4

          echo "[LUTHER] Normalizing timestamp..."
          touch -t $(date +%Y%m%d0000) clean_final.mp4

          echo "[LUTHER] Audit post-strip:"
          ffprobe -v quiet -print_format json -show_format clean_final.mp4 | \
            python3 << 'PYEOF'
          import json,sys
          d=json.load(sys.stdin)
          tags=d.get('format',{}).get('tags',{})
          suspects=['remotion','manim','ffmpeg','lavf','claude','python','playwright','maplibre','gumloop','chromium']
          found=[k for k,v in tags.items() if any(s in str(v).lower() for s in suspects)]
          if found: print(f'Suspects: {found}')
          else: print('Zero trace')
          PYEOF
          ls -lh clean_final.mp4

      - name: Upload clean artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-hybrid-clean
          path: clean_final.mp4

      - name: Upload to release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.run_id }}" clean_final.mp4 --clobber
