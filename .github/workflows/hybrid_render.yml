name: "CYPHER — Hybrid Render (CYPHER × GAMMA)"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Release tag for assets"
        default: "CYP_HYBRID_20260703"

permissions:
  contents: write
  packages: read

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Render CYPHER travel chunks (MapLibre — runner nu)
  # ═══════════════════════════════════════════════════════════════
  render-cypher:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        chunk: [1, 3, 5, 7, 9]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        working-directory: F03_DEATHWING/CODEBASE
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Download assets
        working-directory: F03_DEATHWING/CODEBASE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          cp ../../SHARED/hybrid_spec.json assets/
          curl -sL -o assets/us_states.geojson \
            "https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json"

      - name: Render chunk ${{ matrix.chunk }}
        working-directory: F03_DEATHWING/CODEBASE
        run: |
          node render_hybrid.js \
            --spec assets/hybrid_spec.json \
            --chunk ${{ matrix.chunk }} \
            --output chunk_${{ matrix.chunk }}.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk }}
          path: F03_DEATHWING/CODEBASE/chunk_${{ matrix.chunk }}.mp4

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Render GAMMA story chunks (Remotion — Docker, --sequence mode)
  # ═══════════════════════════════════════════════════════════════
  render-gamma:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ghcr.io/kioka8877-ux/cypher-gamma:latest
      env:
        REMOTION_CHROME_EXECUTABLE: /usr/bin/chromium
    strategy:
      matrix:
        chunk: [0, 2, 4, 6, 8]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup — deps + fonts from Docker image
        working-directory: F03_GAMMA/CODEBASE
        run: |
          cp -r /app/node_modules node_modules
          mkdir -p public/fonts
          cp /app/public/fonts/*.woff2 public/fonts/
          FONT_COUNT=$(ls public/fonts/*.woff2 2>/dev/null | wc -l)
          echo "[FONTS] $FONT_COUNT polices copiées"
          ls -la public/fonts/

      - name: Download assets (Python urllib — proven method from Run #9)
        working-directory: F03_GAMMA/CODEBASE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.run_id }}
          REPO_FULL: ${{ github.repository }}
        run: |
          mkdir -p public/images
          cp ../../SHARED/hybrid_spec.json public/

          python3 << 'PYEOF'
          import json, urllib.request, os, sys

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO_FULL"]
          tag = os.environ["RELEASE_TAG"]
          api_headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "CYPHER-CI"
          }

          # 1. Get release by tag
          url = f"https://api.github.com/repos/{repo}/releases/tags/{tag}"
          req = urllib.request.Request(url, headers=api_headers)
          with urllib.request.urlopen(req) as resp:
              raw = resp.read()
          release = json.loads(raw, strict=False)

          assets = {a["name"]: a for a in release.get("assets", [])}
          print(f"Release '{tag}' has {len(assets)} assets: {list(assets.keys())}")

          def download_asset(name, output_path, required=True):
              if name not in assets:
                  if required:
                      print(f"  ❌ FATAL: '{name}' not found")
                      sys.exit(1)
                  else:
                      print(f"  ⚠️ '{name}' not found (optional)")
                      return False
              aid = assets[name]["id"]
              dl_url = f"https://api.github.com/repos/{repo}/releases/assets/{aid}"
              dl_headers = {
                  "Authorization": f"token {token}",
                  "Accept": "application/octet-stream",
                  "User-Agent": "CYPHER-CI"
              }
              req = urllib.request.Request(dl_url, headers=dl_headers)
              with urllib.request.urlopen(req) as resp:
                  data = resp.read()
              with open(output_path, "wb") as f:
                  f.write(data)
              print(f"  ✅ {name}: {len(data)/1024:.0f} KB")
              return True

          print("\n=== Downloading images.zip ===")
          download_asset("images.zip", "public/images.zip", required=True)

          print("\n=== Downloading audio_clean.mp3 ===")
          download_asset("audio_clean.mp3", "public/audio_clean.mp3", required=False)

          print("\n=== Downloading timing.json ===")
          download_asset("timing.json", "public/timing.json", required=False)

          print("\n=== All downloads complete ===")
          PYEOF

          # Unzip images
          echo ""
          echo "=== Unzipping images ==="
          unzip -q -o public/images.zip -d public/images/
          echo "Images: $(ls public/images/ | wc -l) fichiers"
          ls -la public/images/

      - name: Render gamma chunk ${{ matrix.chunk }} (--sequence mode)
        working-directory: F03_GAMMA/CODEBASE
        run: |
          CHUNK_ID=${{ matrix.chunk }}
          START_FRAME=$(python3 -c "
          import json
          spec = json.load(open('public/hybrid_spec.json'))
          chunk = [c for c in spec['chunks'] if c['id']==$CHUNK_ID][0]
          fps = spec['meta']['fps']
          print(int(round(chunk['start'] * fps)))
          ")
          END_FRAME=$(python3 -c "
          import json
          spec = json.load(open('public/hybrid_spec.json'))
          chunk = [c for c in spec['chunks'] if c['id']==$CHUNK_ID][0]
          fps = spec['meta']['fps']
          print(int(round(chunk['end'] * fps)) - 1)
          ")
          FRAMES=$((END_FRAME - START_FRAME + 1))
          FPS=$(python3 -c "import json; print(json.load(open('public/hybrid_spec.json'))['meta']['fps'])")
          echo "[CHUNK $CHUNK_ID] Frames $START_FRAME to $END_FRAME ($FRAMES frames @ ${FPS}fps)"

          CHROME=$(which chromium 2>/dev/null || which chromium-browser 2>/dev/null || echo "/usr/bin/chromium")
          echo "[CHROME] Using: $CHROME"

          START_TS=$(date +%s)

          # ── BYPASS COMPOSITOR — séquence JPEG + FFmpeg (zero hang) ──
          FRAMES_DIR=/tmp/frames_${CHUNK_ID}
          mkdir -p $FRAMES_DIR

          npx remotion render \
            src/index.jsx \
            CypherGamma \
            $FRAMES_DIR \
            --sequence \
            --image-format=jpeg \
            --gl=swangle \
            --frames=$START_FRAME-$END_FRAME \
            --concurrency=2 \
            --timeout=60000 \
            --browser-executable=$CHROME

          FRAME_COUNT=$(ls $FRAMES_DIR/*.jpeg 2>/dev/null | wc -l)
          echo "[CHUNK $CHUNK_ID] $FRAME_COUNT frames JPEG rendues"

          # ── Encoder JPEG → MP4 ──
          ffmpeg -y \
            -framerate $FPS \
            -pattern_type glob -i "$FRAMES_DIR/*.jpeg" \
            -c:v libx264 -preset fast -crf 18 \
            -pix_fmt yuv420p \
            chunk_${CHUNK_ID}.mp4

          END_TS=$(date +%s)
          ELAPSED=$((END_TS - START_TS))
          SIZE=$(du -h chunk_${CHUNK_ID}.mp4 | cut -f1)
          FPS_REAL=$(echo "$FRAMES $ELAPSED" | awk '{printf "%.1f", $1/$2}')
          echo "[CHUNK $CHUNK_ID] ✅ Terminé en ${ELAPSED}s — ${SIZE} — ${FPS_REAL} fps réels"

      - uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.chunk }}
          path: F03_GAMMA/CODEBASE/chunk_${{ matrix.chunk }}.mp4

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Assemble all chunks + remux audio (runner nu)
  # ═══════════════════════════════════════════════════════════════
  assemble:
    needs: [render-cypher, render-gamma]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          merge-multiple: true
          path: chunks/

      - name: List chunks
        run: ls -la chunks/

      - name: Download audio
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.run_id }}" \
            --pattern "audio_clean.mp3" --dir . || true

      - name: Concat chunks in hybrid_spec order
        run: |
          python3 << 'PYEOF'
          import json
          spec = json.load(open('SHARED/hybrid_spec.json'))
          with open('concat.txt', 'w') as f:
              for chunk in spec['chunks']:
                  cid = chunk['id']
                  path = f'chunks/chunk_{cid}.mp4'
                  f.write(f"file '{path}'\n")
          print('concat.txt written')
          PYEOF
          cat concat.txt
          ffmpeg -f concat -safe 0 -i concat.txt -c copy cypher_video_noaudio.mp4

      - name: Remux with audio
        run: |
          if [ -f audio_clean.mp3 ]; then
            ffmpeg -i cypher_video_noaudio.mp4 -i audio_clean.mp3 \
              -c:v copy -c:a aac -shortest cypher_final.mp4
          else
            cp cypher_video_noaudio.mp4 cypher_final.mp4
          fi
          ls -lh cypher_final.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-hybrid-final
          path: cypher_final.mp4
          retention-days: 7

      - name: Upload to release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.run_id }}" cypher_final.mp4 --clobber

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: F05 LUTHER — strip metadata (runner nu)
  # ═══════════════════════════════════════════════════════════════
  luther:
    needs: assemble
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - uses: actions/download-artifact@v4
        with:
          name: cypher-hybrid-final
          path: .

      - name: Strip metadata
        run: |
          echo "[LUTHER] Stripping..."
          ffmpeg -i cypher_final.mp4 -c copy -map_metadata -1 -fflags +bitexact clean_final.mp4
          touch -t $(date +%Y%m%d0000) clean_final.mp4

          echo "[LUTHER] Audit post-strip:"
          ffprobe -v quiet -print_format json -show_format clean_final.mp4 > /tmp/post.json 2>&1 || true
          python3 << 'PYEOF' || true
          import json
          try:
              d = json.load(open('/tmp/post.json'))
              tags = d.get('format', {}).get('tags', {})
              suspects = ['remotion','manim','ffmpeg','lavf','claude','python','playwright','maplibre','gumloop','chromium']
              found = [k for k,v in tags.items() if any(s in str(v).lower() for s in suspects)]
              if found: print(f'⚠️ Suspects: {found}')
              else: print('✅ Zero trace')
          except: print('Audit skipped')
          PYEOF
          ls -lh clean_final.mp4

      - name: Upload clean artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-hybrid-clean
          path: clean_final.mp4

      - name: Upload to release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.run_id }}" clean_final.mp4 --clobber
