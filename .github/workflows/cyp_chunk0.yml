name: CYPHER — Chunk 0 (Preview + Gate)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "CYPHER run_id"
        required: true

jobs:
  chunk0:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev \
            fonts-liberation fonts-dejavu-core \
            libpangocairo-1.0-0 libglib2.0-dev pkg-config build-essential \
            ffmpeg
          sudo fc-cache -fv
          pip install --upgrade pip wheel

      - name: Install Manim + geo
        run: pip install manim==0.20.1 geopandas matplotlib contextily requests Pillow

      - name: Download assets from release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p ws && cd ws
          gh release download "${{ inputs.run_id }}" --repo ${{ github.repository }} --pattern "render_spec_v2.json" --dir . || \
          gh release download "${{ inputs.run_id }}" --repo ${{ github.repository }} --pattern "render_spec.json" --dir .
          gh release download "${{ inputs.run_id }}" --repo ${{ github.repository }} --pattern "logos.zip" --dir .
          mkdir -p logos && cd logos && unzip -o ../logos.zip && cd ..
          echo "Logos:" && ls -lh logos/
          ls -lh

      - name: Copy scene files
        run: |
          cp F03_DEATHWING/CODEBASE/CypherScene.py ws/CypherScene.py
          cp F03_DEATHWING/CODEBASE/cyp_camera_plan.py ws/cyp_camera_plan.py

      - name: Generate camera_plan.json
        run: cd ws && python cyp_camera_plan.py

      - name: Render PREVIEW (segments 0-1)
        run: |
          cd ws
          CYP_SEG_FROM=0 CYP_SEG_TO=1 python -m manim render CypherScene.py CypherScene -ql
          PREV=$(find ./media -name "*.mp4" 2>/dev/null | grep -v partial | head -1)
          if [ -z "$PREV" ]; then echo "::error::no preview" && exit 1; fi
          cp "$PREV" preview_chunk0.mp4
          ls -lh preview_chunk0.mp4 camera_plan.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cypher-chunk0-${{ inputs.run_id }}
          path: |
            ws/preview_chunk0.mp4
            ws/camera_plan.json
          retention-days: 7

      - name: Publish to release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd ws
          gh release upload "${{ inputs.run_id }}" preview_chunk0.mp4 camera_plan.json --repo ${{ github.repository }} --clobber
          echo "✅ Preview ready. Download & validate, then run Render All."
