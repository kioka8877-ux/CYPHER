<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CYPHER DEATHWING — Hybrid Travel Mode</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
  #map { width: 100%; height: 100%; }

  /* State name overlay — appears on landing */
  #state-label {
    position: absolute;
    top: 80px;
    left: 0; right: 0;
    text-align: center;
    z-index: 100;
    pointer-events: none;
  }
  #state-label .name {
    font-family: 'Arial Black', Impact, sans-serif;
    font-size: 56px;
    color: #FFFFFF;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.7);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #state-label .name.visible { opacity: 1; }
</style>
</head>
<body>
<div id="map"></div>
<div id="state-label"><span class="name"></span></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════════════════════
let map, hybridData;
let currentHighlightId = null;
window.mapReady = false;
window.hybridReady = false;

// ═══════════════════════════════════════════════════════════════
// EASING
// ═══════════════════════════════════════════════════════════════
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;
}
function lerp(a, b, t) { return a + (b-a) * t; }

// ═══════════════════════════════════════════════════════════════
// MAP INIT — dimensions dynamiques (vertical ou horizontal)
// ═══════════════════════════════════════════════════════════════
map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'esri-sat': {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256, maxzoom: 19,
        attribution: 'Tiles © Esri'
      }
    },
    layers: [{ id: 'satellite', type: 'raster', source: 'esri-sat' }]
  },
  center: [0, 20], zoom: 1.5, pitch: 0, bearing: 0,
  interactive: false,
  preserveDrawingBuffer: true,
  fadeDuration: 0
});

map.on('load', () => {
  window.map = map;
  window.mapReady = true;
});

// ═══════════════════════════════════════════════════════════════
// INIT HYBRID
// ═══════════════════════════════════════════════════════════════
window.initHybrid = function(data) {
  hybridData = data;
  const { geojson, cypher_config } = data;

  // Add GeoJSON source for state highlights (if available)
  if (geojson) {
    map.addSource('regions', { type: 'geojson', data: geojson });
  }

  window.hybridReady = true;
};

// ═══════════════════════════════════════════════════════════════
// HIGHLIGHT
// ═══════════════════════════════════════════════════════════════
function showHighlight(stateIso, color, opacity) {
  if (currentHighlightId === stateIso) return;
  clearHighlight();
  currentHighlightId = stateIso;

  if (!map.getSource('regions')) return;

  // Match by postal code or ISO code
  const f = ['any',
    ['==', ['get', 'STUSPS'], stateIso],
    ['==', ['get', 'postal'], stateIso],
    ['==', ['get', 'ISO_A2'], stateIso],
    ['==', ['get', 'iso_a2'], stateIso],
    ['==', ['get', 'ABBREV'], stateIso]
  ];

  map.addLayer({
    id: 'hy-fill', type: 'fill', source: 'regions', filter: f,
    paint: { 'fill-color': color || '#A0D2DB', 'fill-opacity': opacity || 0.45 }
  });
  map.addLayer({
    id: 'hy-glow', type: 'line', source: 'regions', filter: f,
    paint: { 'line-color': color || '#A0D2DB', 'line-width': 10, 'line-blur': 6, 'line-opacity': 0.5 }
  });
  map.addLayer({
    id: 'hy-border', type: 'line', source: 'regions', filter: f,
    paint: { 'line-color': '#ffffff', 'line-width': 2 }
  });
}

function clearHighlight() {
  ['hy-fill','hy-glow','hy-border'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  currentHighlightId = null;
}

// ═══════════════════════════════════════════════════════════════
// STATE LABEL
// ═══════════════════════════════════════════════════════════════
function showStateLabel(name) {
  const el = document.querySelector('#state-label .name');
  el.textContent = name;
  el.classList.add('visible');
}

function hideStateLabel() {
  document.querySelector('#state-label .name').classList.remove('visible');
}

// ═══════════════════════════════════════════════════════════════
// TRAVEL STATE MACHINE
// ═══════════════════════════════════════════════════════════════
let _prevChunkId = -1;

window.applyTravelState = function(t, chunkId) {
  if (!hybridData) return;
  const { chunks, cypher_config, fps } = hybridData;

  // Find the chunk
  const chunk = chunks.find(c => c.id === chunkId);
  if (!chunk) return;

  const duration = chunk.end - chunk.start;
  const timeInChunk = t - chunk.start;
  const progress = Math.max(0, Math.min(1, timeInChunk / duration));
  const easedProgress = easeInOutCubic(progress);

  const color = cypher_config ? cypher_config.highlight_color : '#A0D2DB';
  const opacity = cypher_config ? cypher_config.highlight_opacity : 0.45;

  // Segment change → cleanup
  if (_prevChunkId !== chunkId) {
    clearHighlight();
    hideStateLabel();
    _prevChunkId = chunkId;
  }

  // ══ CAMERA — interpolate from → to ══
  const fromLon = chunk.from.lon;
  const fromLat = chunk.from.lat;
  const fromZoom = chunk.from.zoom;
  const toLon = chunk.to.lon;
  const toLat = chunk.to.lat;
  const toZoom = chunk.to.zoom;

  const curLon = lerp(fromLon, toLon, easedProgress);
  const curLat = lerp(fromLat, toLat, easedProgress);
  const curZoom = lerp(fromZoom, toZoom, easedProgress);

  // Pitch: start flat, rise during travel, settle at destination
  const pitchCurve = Math.sin(progress * Math.PI); // 0→1→0
  const curPitch = 15 + pitchCurve * 25; // 15° → 40° → 15°

  map.jumpTo({
    center: [curLon, curLat],
    zoom: curZoom,
    pitch: curPitch,
    bearing: 0
  });

  // ══ HIGHLIGHT — appear in the last 30% of travel ══
  if (progress > 0.7 && chunk.state_iso && chunk.action !== 'travel_out') {
    showHighlight(chunk.state_iso, color, opacity * Math.min(1, (progress - 0.7) / 0.2));
  }

  // ══ STATE LABEL — appear in the last 20% ══
  if (progress > 0.8 && chunk.state_name && chunk.action !== 'travel_out') {
    showStateLabel(chunk.state_name);
  } else {
    hideStateLabel();
  }
};
</script>
</body>
</html>
