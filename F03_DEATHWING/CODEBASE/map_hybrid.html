<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CYPHER DEATHWING — Hybrid Travel Mode</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #FFFFFF; }
  #map { width: 100%; height: 100%; }

  /* State name overlay — appears on landing */
  #state-label {
    position: absolute;
    top: 80px;
    left: 0; right: 0;
    text-align: center;
    z-index: 100;
    pointer-events: none;
  }
  #state-label .name {
    font-family: 'Arial Black', Impact, sans-serif;
    font-size: 56px;
    color: #FFFFFF;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.7);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #state-label .name.visible { opacity: 1; }
</style>
</head>
<body>
<div id="map"></div>
<div id="state-label"><span class="name"></span></div>

<script>
'use strict';

// State color palette — matches viewer V26
var STATE_COLORS = {
  'WA':'#B8E1F0','OR':'#93B7D4','CA':'#FFCA06','NV':'#FDC78E','AZ':'#9DA53B',
  'UT':'#C178AE','ID':'#00B26A','MT':'#B8E1F0','WY':'#FFDCB6','CO':'#93B7D4',
  'NM':'#FDC78E','ND':'#FFDCB6','SD':'#C178AE','NE':'#9DA53B','KS':'#00B26A',
  'OK':'#FFCA06','TX':'#FDC78E','MN':'#93B7D4','IA':'#B8E1F0','MO':'#C178AE',
  'AR':'#9DA53B','LA':'#00B26A','WI':'#FFDCB6','IL':'#93B7D4','MS':'#FFCA06',
  'MI':'#B8E1F0','IN':'#FDC78E','OH':'#C178AE','KY':'#9DA53B','TN':'#00B26A',
  'AL':'#93B7D4','FL':'#FFCA06','GA':'#00B26A','SC':'#FDC78E','NC':'#B8E1F0',
  'VA':'#C178AE','WV':'#9DA53B','MD':'#FFCA06','DE':'#93B7D4','PA':'#00B26A',
  'NJ':'#FDC78E','NY':'#C178AE','CT':'#B8E1F0','RI':'#FFDCB6','MA':'#93B7D4',
  'VT':'#9DA53B','NH':'#00B26A','ME':'#FFCA06'
};

var STATE_NAMES = {
  'MD':'Maryland','GA':'Georgia','VA':'Virginia','FL':'Florida',
  'CA':'California','TX':'Texas','NY':'New York','PA':'Pennsylvania',
  'OH':'Ohio','MI':'Michigan','IL':'Illinois','NC':'North Carolina',
  'AZ':'Arizona','WA':'Washington','OR':'Oregon','NV':'Nevada',
  'UT':'Utah','ID':'Idaho','MT':'Montana','WY':'Wyoming','CO':'Colorado',
  'NM':'New Mexico','ND':'North Dakota','SD':'South Dakota','NE':'Nebraska',
  'KS':'Kansas','OK':'Oklahoma','MN':'Minnesota','IA':'Iowa','MO':'Missouri',
  'AR':'Arkansas','LA':'Louisiana','WI':'Wisconsin','MS':'Mississippi',
  'IN':'Indiana','KY':'Kentucky','TN':'Tennessee','AL':'Alabama',
  'SC':'South Carolina','WV':'West Virginia','DE':'Delaware','NJ':'New Jersey',
  'CT':'Connecticut','RI':'Rhode Island','MA':'Massachusetts','VT':'Vermont',
  'NH':'New Hampshire','ME':'Maine'
};

// Helper: get state ISO from GeoJSON feature properties
function getFeatureIso(f) {
  var p = f.properties || {};
  return p.STUSPS || p.postal || p.iso_a2 || p.ISO_A2 || p.ABBREV || p.STATE || '';
}

// Helper: get state name from GeoJSON feature properties
function getFeatureName(f) {
  var p = f.properties || {};
  return p.NAME || p.name || p.STNAME || '';
}

// Generate a color for a state based on ISO code, fallback cycle
var FALLBACK_COLORS = ['#FFCA06','#00B26A','#93B7D4','#C178AE','#FDC78E','#FFDCB6','#9DA53B','#B8E1F0'];
function getStateColor(iso, idx) {
  if (STATE_COLORS[iso]) return STATE_COLORS[iso];
  return FALLBACK_COLORS[idx % FALLBACK_COLORS.length];
}

// Globals
let map, hybridData;
let currentHighlightId = null;
window.mapReady = false;
window.hybridReady = false;

// Easing
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;
}
function lerp(a, b, t) { return a + (b-a) * t; }

// Map init — white background, no satellite tiles
map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {},
    layers: [
      { id: 'white-bg', type: 'background', paint: { 'background-color': '#FFFFFF' } }
    ]
  },
  center: [0, 20], zoom: 1.5, pitch: 0, bearing: 0,
  interactive: false,
  preserveDrawingBuffer: true,
  fadeDuration: 0
});

map.on('load', () => {
  window.map = map;
  window.mapReady = true;
});

// Init hybrid — add GeoJSON states with colors
window.initHybrid = function(data) {
  hybridData = data;
  const { geojson, cypher_config } = data;

  if (geojson) {
    // Add the states GeoJSON source
    map.addSource('regions', { type: 'geojson', data: geojson });

    // Build a match expression for state colors using 'name' property
    // PublicaMundi GeoJSON uses 'name' (e.g. "Maryland"), not STUSPS
    var matchExpr = ['match', ['get', 'name']];
    var matchExpr2 = ['match', ['get', 'NAME']];
    var idx = 0;

    // Full state name to color mapping
    var STATE_NAME_COLORS = {
      'Washington':'#B8E1F0','Oregon':'#93B7D4','California':'#FFCA06','Nevada':'#FDC78E','Arizona':'#9DA53B',
      'Utah':'#C178AE','Idaho':'#00B26A','Montana':'#B8E1F0','Wyoming':'#FFDCB6','Colorado':'#93B7D4',
      'New Mexico':'#FDC78E','North Dakota':'#FFDCB6','South Dakota':'#C178AE','Nebraska':'#9DA53B','Kansas':'#00B26A',
      'Oklahoma':'#FFCA06','Texas':'#FDC78E','Minnesota':'#93B7D4','Iowa':'#B8E1F0','Missouri':'#C178AE',
      'Arkansas':'#9DA53B','Louisiana':'#00B26A','Wisconsin':'#FFDCB6','Illinois':'#93B7D4','Mississippi':'#FFCA06',
      'Michigan':'#B8E1F0','Indiana':'#FDC78E','Ohio':'#C178AE','Kentucky':'#9DA53B','Tennessee':'#00B26A',
      'Alabama':'#93B7D4','Florida':'#FFCA06','Georgia':'#00B26A','South Carolina':'#FDC78E','North Carolina':'#B8E1F0',
      'Virginia':'#C178AE','West Virginia':'#9DA53B','Maryland':'#FFCA06','Delaware':'#93B7D4','Pennsylvania':'#00B26A',
      'New Jersey':'#FDC78E','New York':'#C178AE','Connecticut':'#B8E1F0','Rhode Island':'#FFDCB6','Massachusetts':'#93B7D4',
      'Vermont':'#9DA53B','New Hampshire':'#00B26A','Maine':'#FFCA06'
    };

    if (geojson.features) {
      for (var i = 0; i < geojson.features.length; i++) {
        var f = geojson.features[i];
        var name = getFeatureName(f);
        var color = STATE_NAME_COLORS[name] || getStateColor(getFeatureIso(f), idx);
        if (name) matchExpr.push(name, color);
        if (name) matchExpr2.push(name, color);
        idx++;
      }
    }
    matchExpr.push('#D4B83A');
    matchExpr2.push('#D4B83A');

    // Fill layer — colored states
    map.addLayer({
      id: 'states-fill',
      type: 'fill',
      source: 'regions',
      paint: {
        'fill-color': matchExpr,
        'fill-opacity': 0.85
      }
    });

    // Try alternate property names if STUSPS didn't match
    // Use a second fill layer with name-based matching as fallback
    // (only visible if first layer shows default color for all)

    // State borders — thin brown lines
    map.addLayer({
      id: 'states-border',
      type: 'line',
      source: 'regions',
      paint: {
        'line-color': 'rgba(80,50,20,0.5)',
        'line-width': 1
      }
    });

    // State name labels
    map.addLayer({
      id: 'state-labels',
      type: 'symbol',
      source: 'regions',
      layout: {
        'text-field': ['get', 'name'],
        'text-font': ['Open Sans Semibold', 'Arial Unicode MS Bold'],
        'text-size': 12,
        'text-anchor': 'center',
        'text-allow-overlap': true
      },
      paint: {
        'text-color': 'rgba(60,40,10,0.8)',
        'text-halo-color': '#FFFFFF',
        'text-halo-width': 1
      }
    });
  }

  window.hybridReady = true;
};

// Highlight
function showHighlight(stateIso, color, opacity) {
  if (currentHighlightId === stateIso) return;
  clearHighlight();
  currentHighlightId = stateIso;

  if (!map.getSource('regions')) return;

  var stateFullName = STATE_NAMES[stateIso] || stateIso;
  var f = ['any',
    ['==', ['get', 'STUSPS'], stateIso],
    ['==', ['get', 'postal'], stateIso],
    ['==', ['get', 'ISO_A2'], stateIso],
    ['==', ['get', 'iso_a2'], stateIso],
    ['==', ['get', 'ABBREV'], stateIso],
    ['==', ['get', 'name'], stateIso],
    ['==', ['get', 'name'], stateFullName],
    ['==', ['get', 'NAME'], stateFullName],
    ['==', ['get', 'NAME'], stateIso]
  ];

  map.addLayer({
    id: 'hy-fill', type: 'fill', source: 'regions', filter: f,
    paint: { 'fill-color': color || '#B30006', 'fill-opacity': opacity || 0.45 }
  });
  map.addLayer({
    id: 'hy-glow', type: 'line', source: 'regions', filter: f,
    paint: { 'line-color': color || '#B30006', 'line-width': 10, 'line-blur': 6, 'line-opacity': 0.5 }
  });
  map.addLayer({
    id: 'hy-border', type: 'line', source: 'regions', filter: f,
    paint: { 'line-color': '#FFFFFF', 'line-width': 2 }
  });
}

function clearHighlight() {
  ['hy-fill','hy-glow','hy-border'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  currentHighlightId = null;
}

// State label
function showStateLabel(name) {
  const el = document.querySelector('#state-label .name');
  el.textContent = name;
  el.classList.add('visible');
}

function hideStateLabel() {
  document.querySelector('#state-label .name').classList.remove('visible');
}

// Travel state machine
let _prevChunkId = -1;

window.applyTravelState = function(t, chunkId) {
  if (!hybridData) return;
  const { chunks, cypher_config, fps } = hybridData;

  const chunk = chunks.find(c => c.id === chunkId);
  if (!chunk) return;

  const duration = chunk.end - chunk.start;
  const timeInChunk = t - chunk.start;
  const progress = Math.max(0, Math.min(1, timeInChunk / duration));
  const easedProgress = easeInOutCubic(progress);

  const color = cypher_config ? cypher_config.highlight_color : '#B30006';
  const opacity = cypher_config ? cypher_config.highlight_opacity : 0.45;

  if (_prevChunkId !== chunkId) {
    clearHighlight();
    hideStateLabel();
    _prevChunkId = chunkId;
  }

  // Camera — interpolate from to
  const fromLon = chunk.from.lon;
  const fromLat = chunk.from.lat;
  const fromZoom = chunk.from.zoom;
  const toLon = chunk.to.lon;
  const toLat = chunk.to.lat;
  const toZoom = chunk.to.zoom;

  const curLon = lerp(fromLon, toLon, easedProgress);
  const curLat = lerp(fromLat, toLat, easedProgress);
  const curZoom = lerp(fromZoom, toZoom, easedProgress);

  // Pitch: start flat, rise during travel, settle at destination
  const pitchCurve = Math.sin(progress * Math.PI);
  const curPitch = 15 + pitchCurve * 25;

  map.jumpTo({
    center: [curLon, curLat],
    zoom: curZoom,
    pitch: curPitch,
    bearing: 0
  });

  // Highlight — appear in the last 30% of travel
  if (progress > 0.7 && chunk.state_iso && chunk.action !== 'travel_out') {
    showHighlight(chunk.state_iso, color, opacity * Math.min(1, (progress - 0.7) / 0.2));
  }

  // State label — appear in the last 20%
  if (progress > 0.8 && chunk.state_name && chunk.action !== 'travel_out') {
    showStateLabel(chunk.state_name);
  } else {
    hideStateLabel();
  }
};
</script>
</body>
</html>
