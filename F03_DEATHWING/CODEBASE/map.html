<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1080, height=1920">
<title>CYPHER DEATHWING v9.5</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0a0a12; }
  #map { width: 100%; height: 100%; }

  .brand-marker {
    display: none;
    width: 120px; height: 120px;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: opacity 0.3s ease;
  }
  .brand-marker.visible { display: flex; align-items: center; justify-content: center; }
  .brand-marker img { width: 90%; height: 90%; object-fit: contain; }
  .brand-marker .fallback-text {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 16px; color: #333; text-align: center;
    padding: 8px; word-break: break-word;
  }

  #subtitle-container {
    position: absolute; bottom: 60px; left: 0; right: 0;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
    padding: 0 40px; z-index: 100;
  }
  .subtitle-word {
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 32px; color: #a3f609;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7);
    opacity: 0; transition: opacity 0.15s;
  }
  .subtitle-word.visible { opacity: 1; }
</style>
</head>
<body>
<div id="map"></div>
<div id="subtitle-container"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════════════════════
let map, cypherData, countryFeatures = {};
let currentMarkers = [], currentHighlightId = null;
window.mapReady = false;
window.cypherReady = false;

const TRANSITION_DURATION = 0.8; // Single source of truth — snappy camera move

// ══════════════════════════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════════════════════════
map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'esri-sat': {
        type: 'raster',
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        tileSize: 256, maxzoom: 19,
        attribution: 'Tiles © Esri'
      }
    },
    layers: [{ id: 'satellite', type: 'raster', source: 'esri-sat' }]
  },
  center: [0, 20], zoom: 1.5, pitch: 0, bearing: 0,
  interactive: false,
  preserveDrawingBuffer: true,
  fadeDuration: 0
});

map.on('load', () => {
  window.map = map;
  window.mapReady = true;
});

// ══════════════════════════════════════════════════════════════
// ISO MAPPING
// ══════════════════════════════════════════════════════════════
const ISO2TO3 = {
  US:'USA',DE:'DEU',JP:'JPN',KR:'KOR',FR:'FRA',IT:'ITA',SE:'SWE',
  CN:'CHN',CA:'CAN',GB:'GBR',AE:'ARE',TW:'TWN',CH:'CHE',NL:'NLD',
  ES:'ESP',AU:'AUS',SG:'SGP',IN:'IND',FI:'FIN',DK:'DNK',BR:'BRA',
  NO:'NOR',IE:'IRL',NZ:'NZL',ZA:'ZAF',MX:'MEX',AR:'ARG',TR:'TUR',
  SA:'SAU',EG:'EGY',TH:'THA',VN:'VNM',PH:'PHL',MY:'MYS',ID:'IDN',
  PK:'PAK',BD:'BGD',RU:'RUS',UA:'UKR',PL:'POL',CZ:'CZE',GR:'GRC',
  PT:'PRT',HU:'HUN',RO:'ROU',BG:'BGR',HR:'HRV',AT:'AUT',BE:'BEL'
};

// ══════════════════════════════════════════════════════════════
// EASING
// ══════════════════════════════════════════════════════════════
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;
}
function lerp(a, b, t) { return a + (b-a) * t; }

// ══════════════════════════════════════════════════════════════
// INIT CYPHER
// ══════════════════════════════════════════════════════════════
window.initCypher = function(data) {
  cypherData = data;
  const { geojson, map_config, display, segments } = data;

  map.addSource('countries', { type: 'geojson', data: geojson });

  // Index country features by ALL ISO columns
  for (const feat of geojson.features) {
    const codes = [
      feat.properties['ISO_A3'],
      feat.properties['ISO_A3_EH'],
      feat.properties['ADM0_A3']
    ].filter(c => c && c !== '-99');
    for (const code of codes) {
      if (!countryFeatures[code]) countryFeatures[code] = feat;
    }
    const a2 = feat.properties['ISO_A2'] || feat.properties['ISO_A2_EH'];
    if (a2 && a2 !== '-99' && !countryFeatures[ISO2TO3[a2]]) {
      countryFeatures[a2] = feat;
    }
  }

  // Pre-calculate bounds & zoom for each segment
  for (const seg of segments) {
    const iso3 = ISO2TO3[seg.iso] || seg.iso;
    const feat = countryFeatures[iso3];
    if (feat) {
      const bounds = getFeatureBounds(feat);
      const lonSpan = Math.min(bounds.lonSpan, 60);
      const latSpan = Math.min(bounds.latSpan, 40);
      seg._bounds = { ...bounds, lonSpan, latSpan };
      const targetLonSpan = lonSpan / 0.95;
      seg._mlZoom = Math.log2(360 / targetLonSpan) + 2.0;
      seg._mlZoom = Math.max(3, Math.min(seg._mlZoom, 14));
    } else {
      seg._mlZoom = seg.zoom || 4;
      seg._bounds = null;
    }

    // Pre-sort brands by word_frame for chronological processing
    if (seg.brands) {
      seg._brandsSorted = [...seg.brands].sort((a, b) => a.word_frame - b.word_frame);
      seg._firstBrandTime = seg._brandsSorted.length > 0
        ? seg._brandsSorted[0].word_frame / data.fps : Infinity;
    } else {
      seg._brandsSorted = [];
      seg._firstBrandTime = Infinity;
    }
  }

  window.cypherReady = true;
};

function getFeatureBounds(feat) {
  let minLon = 180, maxLon = -180, minLat = 90, maxLat = -90;
  function scan(coords) {
    if (typeof coords[0] === 'number') {
      minLon = Math.min(minLon, coords[0]); maxLon = Math.max(maxLon, coords[0]);
      minLat = Math.min(minLat, coords[1]); maxLat = Math.max(maxLat, coords[1]);
    } else { coords.forEach(scan); }
  }
  scan(feat.geometry.coordinates);
  return { minLon, maxLon, minLat, maxLat, lonSpan: maxLon-minLon, latSpan: maxLat-minLat,
           cx: (minLon+maxLon)/2, cy: (minLat+maxLat)/2 };
}

// ══════════════════════════════════════════════════════════════
// HIGHLIGHT
// ══════════════════════════════════════════════════════════════
function showHighlight(iso2, color, opacity) {
  const iso3 = ISO2TO3[iso2] || iso2;
  if (currentHighlightId === iso3) return;
  clearHighlight();
  currentHighlightId = iso3;

  const f = ['any',
    ['==', ['get', 'ISO_A3'], iso3],
    ['==', ['get', 'ISO_A3_EH'], iso3],
    ['==', ['get', 'ADM0_A3'], iso3],
    ['==', ['get', 'ISO_A2'], iso2],
    ['==', ['get', 'ISO_A2_EH'], iso2]
  ];

  map.addLayer({
    id: 'cy-fill', type: 'fill', source: 'countries', filter: f,
    paint: { 'fill-color': color || '#baa0da', 'fill-opacity': opacity || 0.55 }
  });
  map.addLayer({
    id: 'cy-glow', type: 'line', source: 'countries', filter: f,
    paint: { 'line-color': color || '#baa0da', 'line-width': 12, 'line-blur': 8, 'line-opacity': 0.6 }
  });
  map.addLayer({
    id: 'cy-border', type: 'line', source: 'countries', filter: f,
    paint: { 'line-color': '#ffffff', 'line-width': 2.5 }
  });
}

function clearHighlight() {
  ['cy-fill','cy-glow','cy-border'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  currentHighlightId = null;
}

// ══════════════════════════════════════════════════════════════
// LOGOS
// ══════════════════════════════════════════════════════════════
function clearLogos() {
  currentMarkers.forEach(m => m.remove());
  currentMarkers = [];
}

function scatterPositions(n, centerLon, centerLat, radiusLon, radiusLat) {
  const positions = [];
  if (n === 1) { positions.push([centerLon, centerLat]); }
  else {
    for (let i = 0; i < n; i++) {
      const angle = (2 * Math.PI * i / n) - Math.PI/2;
      const r = n <= 3 ? 0.6 : 0.8;
      positions.push([
        centerLon + Math.cos(angle) * radiusLon * r,
        centerLat + Math.sin(angle) * radiusLat * r
      ]);
    }
  }
  return positions;
}

function addLogoMarker(brand, position) {
  const el = document.createElement('div');
  el.className = 'brand-marker visible';
  if (brand._logo_abs) {
    el.innerHTML = '<img src="' + brand._logo_abs + '" onerror="this.parentNode.innerHTML=\'<div class=fallback-text>' + brand.name + '</div>\'\"">';
  } else {
    el.innerHTML = '<div class="fallback-text">' + brand.name + '</div>';
  }
  const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat(position)
    .addTo(map);
  currentMarkers.push(marker);
  return marker;
}

// ══════════════════════════════════════════════════════════════
// SUBTITLES — v9.5 REWRITE (fixes desync)
// ══════════════════════════════════════════════════════════════
function clearSubtitles() {
  const c = document.getElementById('subtitle-container');
  c.innerHTML = '';
  c.dataset.textKey = '';
}

function updateSubtitles(seg, timeS, fps) {
  const container = document.getElementById('subtitle-container');
  if (!seg.brands || !seg.brands.length) {
    container.innerHTML = '';
    return;
  }

  // 1. Use full segment text (render_spec_v2 = 1 country per segment, text is clean)
  const fullText = (seg.text || '').trim();
  if (!fullText) return;

  const words = fullText.split(/\s+/).filter(Boolean);
  if (!words.length) return;

  // 2. Build DOM elements only on segment change
  const textKey = 'seg_' + seg.id;
  if (container.dataset.textKey !== textKey) {
    container.dataset.textKey = textKey;
    container.innerHTML = '';
    const fc = (cypherData.display && cypherData.display.font_color) || '#a3f609';
    for (const w of words) {
      const span = document.createElement('span');
      span.className = 'subtitle-word';
      span.textContent = w;
      span.style.color = fc;
      container.appendChild(span);
    }
  }

  // 3. Calculate per-word timing using brand word_frames as anchors
  //    FIX: Use -1 sentinel (never collides with real time)
  //    FIX: Clean forward-pass interpolation (no loop variable mutation)
  //    FIX: Strict brand matching (no includes() false positives)
  const UNSET = -1;
  const wordTimes = new Array(words.length).fill(UNSET);

  // Sort brands chronologically for reliable matching
  const sortedBrands = seg._brandsSorted || [...seg.brands].sort((a, b) => a.word_frame - b.word_frame);

  // Match each brand to its word position
  for (const b of sortedBrands) {
    const brandTime = b.word_frame / fps;
    // Handle multi-word brands: split on spaces and hyphens for matching
    const brandParts = b.name.toLowerCase().replace(/['']/g, '').split(/[\s-]+/);
    const firstPart = brandParts[0].replace(/[^a-z0-9]/g, '');
    if (!firstPart) continue;

    // Find first UNMATCHED word that matches this brand
    for (let i = 0; i < words.length; i++) {
      if (wordTimes[i] !== UNSET) continue; // skip already-matched words
      const wClean = words[i].toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!wClean) continue;

      // Strict matching: exact match, or prefix match only if both sides are 4+ chars
      const isMatch = (wClean === firstPart) ||
        (firstPart.length >= 4 && wClean.length >= 4 && (
          wClean.startsWith(firstPart) || firstPart.startsWith(wClean)
        ));

      if (isMatch) {
        wordTimes[i] = brandTime;
        // Mark subsequent words of multi-word brands (e.g. "British" "Airways")
        for (let w = 1; w < brandParts.length && (i + w) < words.length; w++) {
          if (wordTimes[i + w] === UNSET) {
            wordTimes[i + w] = brandTime + 0.05 * w;
          }
        }
        break;
      }
    }
  }

  // 4. Anchor endpoints
  if (wordTimes[0] === UNSET) wordTimes[0] = seg.start;
  if (wordTimes[words.length - 1] === UNSET) {
    wordTimes[words.length - 1] = Math.min(seg.end - 0.05, 
      (sortedBrands.length > 0 ? sortedBrands[sortedBrands.length - 1].word_frame / fps + 0.3 : seg.end - 0.05));
  }

  // 5. Forward-pass interpolation: fill gaps between known timestamps
  //    FIX: clean loop, no i mutation, no i-- hack
  let prevIdx = -1;
  for (let i = 0; i < words.length; i++) {
    if (wordTimes[i] !== UNSET) {
      // Found a known timestamp — interpolate gap from prevIdx+1 to i-1
      if (prevIdx >= 0 && i - prevIdx > 1) {
        const startT = wordTimes[prevIdx];
        const endT = wordTimes[i];
        const gap = i - prevIdx;
        for (let j = prevIdx + 1; j < i; j++) {
          wordTimes[j] = startT + (endT - startT) * (j - prevIdx) / gap;
        }
      }
      prevIdx = i;
    }
  }

  // Fill any remaining UNSET at the tail
  if (prevIdx >= 0 && prevIdx < words.length - 1) {
    const startT = wordTimes[prevIdx];
    const endT = seg.end;
    const gap = words.length - prevIdx;
    for (let j = prevIdx + 1; j < words.length; j++) {
      wordTimes[j] = startT + (endT - startT) * (j - prevIdx) / gap;
    }
  }

  // Safety: any still UNSET gets linear spacing from seg.start to seg.end
  for (let i = 0; i < words.length; i++) {
    if (wordTimes[i] === UNSET) {
      wordTimes[i] = seg.start + (seg.end - seg.start) * i / words.length;
    }
  }

  // 6. Reveal words at their calculated time
  const spans = container.querySelectorAll('.subtitle-word');
  for (let i = 0; i < spans.length && i < wordTimes.length; i++) {
    spans[i].classList.toggle('visible', timeS >= wordTimes[i]);
  }
}

// ══════════════════════════════════════════════════════════════
// STATE MACHINE — v9.5
// ══════════════════════════════════════════════════════════════
let _prevSegId = -1;

window.applyStateAtTime = function(t) {
  if (!cypherData) return;
  const { segments, map_config, fps, allSegments } = cypherData;

  // ── Find current segment (including gap frames) ──
  let seg = null;
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    const next = segments[i + 1];
    const endLimit = next ? next.start : s.end;
    if (t >= s.start && t < endLimit) { seg = s; break; }
  }
  if (!seg && allSegments) {
    for (let i = 0; i < allSegments.length; i++) {
      const s = allSegments[i];
      const next = allSegments[i + 1];
      const endLimit = next ? next.start : s.end;
      if (t >= s.start && t < endLimit) {
        seg = segments.find(x => x.id === s.id);
        break;
      }
    }
  }
  if (!seg) seg = segments[segments.length - 1];

  // ── Previous segment (for camera transition origin) ──
  const segIdx = segments.indexOf(seg);
  const prevSeg = segIdx > 0 ? segments[segIdx - 1]
    : (allSegments && seg.id > 0 ? allSegments.find(s => s.id === seg.id - 1) : null);

  const timeInSeg = t - seg.start;
  const targetZoom = seg._mlZoom || 4;

  // ══ CAMERA ══
  if (timeInSeg < TRANSITION_DURATION && timeInSeg >= 0) {
    const from = prevSeg
      ? { lon: prevSeg.lon, lat: prevSeg.lat, zoom: prevSeg._mlZoom || 4 }
      : { lon: 0, lat: 20, zoom: 1.5 };
    const progress = easeInOutCubic(timeInSeg / TRANSITION_DURATION);
    map.jumpTo({
      center: [lerp(from.lon, seg.lon, progress), lerp(from.lat, seg.lat, progress)],
      zoom: lerp(from.zoom, targetZoom, progress),
      pitch: lerp(prevSeg ? 25 : 0, 25, progress),
      bearing: 0
    });
  } else {
    // Static phase — micro-pan toward active logo
    let camLon = seg.lon, camLat = seg.lat;
    if (seg.brands && seg.brands.length > 0 && seg._bounds) {
      const rLon = Math.min(seg._bounds.lonSpan * 0.15, 12);
      const rLat = Math.min(seg._bounds.latSpan * 0.15, 8);
      const positions = scatterPositions(seg.brands.length, seg.lon, seg.lat, rLon, rLat);

      let activeIdx = -1;
      for (let i = seg.brands.length - 1; i >= 0; i--) {
        if (t >= seg.brands[i].word_frame / fps) { activeIdx = i; break; }
      }
      if (activeIdx >= 0 && positions[activeIdx]) {
        camLon = lerp(seg.lon, positions[activeIdx][0], 0.2);
        camLat = lerp(seg.lon, positions[activeIdx][1], 0.2);
      }
    }
    map.jumpTo({ center: [camLon, camLat], zoom: targetZoom, pitch: 25, bearing: 0 });
  }

  // ══ OVERLAYS (decoupled from camera — always synced to absolute time!) ══

  // Segment change → cleanup
  if (_prevSegId !== seg.id) {
    clearHighlight();
    clearLogos();
    clearSubtitles();
    _prevSegId = seg.id;
  }

  // ── HIGHLIGHT ──
  // FIX v9.5: appears as camera approaches (~40% through transition),
  //           disappears when first logo appears (but stays ≥0.3s after transition ends)
  const transEnd = seg.start + TRANSITION_DURATION;
  const highlightStart = seg.start + TRANSITION_DURATION * 0.4;
  const highlightEnd = Math.max(transEnd + 0.3, seg._firstBrandTime || Infinity);
  // Cap: highlight should not persist longer than 2s into the segment
  const highlightMaxEnd = Math.min(highlightEnd, seg.start + 2.0);

  if (t >= highlightStart && t < highlightMaxEnd) {
    showHighlight(seg.iso, map_config.country_color, map_config.country_opacity);
  } else {
    clearHighlight();
  }

  // ── LOGOS (appear at exact word_frame time, decoupled from transition) ──
  if (seg.brands && seg._bounds) {
    const rLon = Math.min(seg._bounds.lonSpan * 0.15, 12);
    const rLat = Math.min(seg._bounds.latSpan * 0.15, 8);
    const positions = scatterPositions(seg.brands.length, seg.lon, seg.lat, rLon, rLat);

    const visibleCount = seg.brands.filter(b => t >= b.word_frame / fps).length;
    if (currentMarkers.length < visibleCount) {
      for (let i = currentMarkers.length; i < visibleCount; i++) {
        addLogoMarker(seg.brands[i], positions[i]);
      }
    }
  }

  // ── SUBTITLES (word-by-word, synced to word_frames) ──
  updateSubtitles(seg, t, fps);
};
</script>
</body>
</html>
