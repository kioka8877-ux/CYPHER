var IMG_CACHE = {};
function preloadImages(cb) {
  var keys = Object.keys(EMBEDDED_IMG);
  var loaded = 0;
  if (!keys.length) { cb(); return; }
  keys.forEach(function(key) {
    var img = new Image();
    img.onload = function() { IMG_CACHE[key] = img; loaded++; if (loaded === keys.length) cb(); };
    img.onerror = function() { loaded++; if (loaded === keys.length) cb(); };
    img.src = EMBEDDED_IMG[key];
  });
}

function getGammaImageKey(stateName) {
  var key = (stateName || '').toLowerCase().replace(/\s/g, '');
  if (key === 'introduction') return 'introstudentdebt';
  if (key === 'maryland') return 'marylanddebt';
  if (key === 'georgia') return 'georgiadebt';
  if (key === 'virginia') return 'virginiadebt';
  if (key === 'florida') return 'floridadebt';
  return null;
}

function getBgImageKey(bgType) {
  for (var i = 0; i < BG_OPTIONS.length; i++) {
    if (BG_OPTIONS[i].value === bgType) return BG_OPTIONS[i].imgKey;
  }
  return null;
}

function gS(k){return ov[k]!==undefined?ov[k]:D[k];}
function sS(k,v){ov[k]=v;}
function cap(s){return s.replace(/\b\w/g,function(c){return c.toUpperCase();});}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function lerp(a,b,t){return a+(b-a)*t;}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function totalDur(){return segs.length?segs[segs.length-1].end-segs[0].start:0;}

function parseSegments(t){
  var r=[];
  for(var i=0;i<t.segments.length;i++){
    var s=t.segments[i];
    r.push({id:i,text:s.text,start:s.start,end:s.end});
  }
  return r;
}

function detectStates(s){
  var f={};
  for(var i=0;i<s.length;i++){
    var t=s[i].text.toLowerCase();
    for(var st in STATE_COORDS){
      if(t.indexOf(st)>=0 && !f[st]) f[st]={name:st};
      if(f[st]) Object.assign(f[st], STATE_COORDS[st]);
    }
  }
  return Object.values(f);
}

function buildChunks(s,st,fps){
  fps=fps||30; var r=[],cid=0;
  if(!st.length){r.push({id:0,engine:'gamma',start:s[0].start,end:s[s.length-1].end,text_subtitles:s.map(function(x){return x.text;}).join(' '),state_name:'Introduction'});return r;}
  var fIdx=null;
  for(var i=0;i<s.length;i++){var t=s[i].text.toLowerCase();for(var j=0;j<st.length;j++){if(t.indexOf(st[j].name)>=0){fIdx=i;break;}}if(fIdx!==null)break;}
  if(fIdx&&fIdx>0){
    var introTxt='';for(var i=0;i<fIdx;i++)introTxt+=s[i].text+' ';
    r.push({id:cid,engine:'gamma',start:s[0].start,end:s[fIdx].start,text_subtitles:introTxt.trim(),state_name:'Introduction'});cid++;
  }
  var prev=null;
  for(var si=0;si<st.length;si++){
    var state=st[si],ss=[];
    for(var i=0;i<s.length;i++){if(s[i].text.toLowerCase().indexOf(state.name)>=0)ss.push(s[i]);}
    if(!ss.length)continue;
    var sStart=ss[0].start,sEnd=ss[ss.length-1].end;
    var tStart=r.length?r[r.length-1].end:0.0,tEnd=sStart;
    if(!prev&&tEnd-tStart<2.0){tEnd=tStart+2.0;sStart=tEnd;}
    if(tEnd>tStart){
      var fc=prev?{lon:prev.lon,lat:prev.lat,zoom:prev.zoom}:{lon:USA.lon,lat:USA.lat,zoom:USA.zoom};
      r.push({id:cid,engine:'cypher',start:tStart,end:tEnd,action:'travel',from:fc,to:{lon:state.lon,lat:state.lat,zoom:state.zoom},state_name:cap(state.name),state_iso:state.iso});cid++;
    }
    var storyTxt='';for(var i=0;i<ss.length;i++)storyTxt+=ss[i].text+' ';
    r.push({id:cid,engine:'gamma',start:sStart,end:sEnd,text_subtitles:storyTxt.trim(),state_name:cap(state.name)});cid++;
    prev=state;
  }
  if(prev&&r.length){
    var oS=r[r.length-1].end,oE=s[s.length-1].end;
    if(oE>oS) r.push({id:cid,engine:'cypher',start:oS,end:oE,action:'travel_out',from:{lon:prev.lon,lat:prev.lat,zoom:prev.zoom},to:{lon:USA.lon,lat:USA.lat,zoom:USA.zoom},state_name:'USA',state_iso:'US'});
  }
  return r;
}

function chunkAt(sec,t){
  var cs=sec==='g'?chunks:sec==='m'?chunks.filter(function(c){return c.engine==='gamma';}):chunks.filter(function(c){return c.engine==='cypher';});
  for(var i=0;i<cs.length;i++){if(t>=cs[i].start&&t<cs[i].end)return cs[i];}
  return cs.length?cs[0]:null;
}

// ═══ DRAW GAMMA (real background texture + capsule with PNG inside) ═══
function drawGammaPreview(ctx,W,H,chunk,t){
  if(!chunk) return;
  var sf=W/854;

  // 1. Draw REAL BACKGROUND TEXTURE IMAGE — fills entire canvas, with scale control
  var bgType = gS('background_type');
  var bgKey = getBgImageKey(bgType);
  var bgScale = parseFloat(gS('background_scale'));
  if (bgKey && IMG_CACHE[bgKey]) {
    var bgImg = IMG_CACHE[bgKey];
    var bw = bgImg.width, bh = bgImg.height;
    // Base scale = cover, then multiply by user scale
    var baseScale = Math.max(W/bw, H/bh);
    var bScale = baseScale * bgScale;
    var bdw = bw * bScale, bdh = bh * bScale;
    var bdx = (W - bdw) / 2, bdy = (H - bdh) / 2;
    ctx.drawImage(bgImg, bdx, bdy, bdw, bdh);
  } else {
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, W, H);
  }

  // 2. Draw CAPSULE — PNG content image goes INSIDE the capsule
  var scale = parseFloat(gS('world_scale'));
  var opacity = parseFloat(gS('world_opacity'));
  var cw = W * scale, ch = H * scale;
  var cx = (W - cw) / 2, cy = (H - ch) / 2;
  var cr = 10 * sf;

  // If title is on the right, shift capsule left by world_title_offset %
  var gammaChunks = chunks.filter(function(c) { return c.engine === 'gamma'; });
  var gammaIdx = gammaChunks.indexOf(chunk);
  var isTitleRight = (gammaIdx % 2 !== 0);
  if (isTitleRight) {
    var offsetPct = parseFloat(gS('world_title_offset'));
    cx -= cw * offsetPct / 100;
  }

  // Clip to capsule shape
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.beginPath();
  ctx.moveTo(cx+cr,cy);ctx.lineTo(cx+cw-cr,cy);ctx.quadraticCurveTo(cx+cw,cy,cx+cw,cy+cr);
  ctx.lineTo(cx+cw,cy+ch-cr);ctx.quadraticCurveTo(cx+cw,cy+ch,cx+cw-cr,cy+ch);
  ctx.lineTo(cx+cr,cy+ch);ctx.quadraticCurveTo(cx,cy+ch,cx,cy+ch-cr);
  ctx.lineTo(cx,cy+cr);ctx.quadraticCurveTo(cx,cy,cx+cr,cy);ctx.closePath();
  ctx.clip();

  // 3. Draw PNG content image INSIDE the capsule
  var imgKey = getGammaImageKey(chunk.state_name);
  if (imgKey && IMG_CACHE[imgKey]) {
    var img = IMG_CACHE[imgKey];
    var iw = img.width, ih = img.height;
    var imgScale = Math.max(cw/iw, ch/ih);
    var dw = iw * imgScale, dh = ih * imgScale;
    var dx = cx + (cw - dw) / 2, dy = cy + (ch - dh) / 2;
    ctx.drawImage(img, dx, dy, dw, dh);
  } else {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(cx, cy, cw, ch);
  }

  // (State name removed from inside capsule — shown only outside above)

  // Vignette inside capsule
  if (gS('vignette')) {
    var vg = ctx.createRadialGradient(cx+cw/2, cy+ch/2, cw*0.2, cx+cw/2, cy+ch/2, cw*0.6);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = vg;
    ctx.fillRect(cx, cy, cw, ch);
  }

  ctx.restore();

  // 5. Capsule border — bright gold
  ctx.strokeStyle = '#C5A44E';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx+cr,cy);ctx.lineTo(cx+cw-cr,cy);ctx.quadraticCurveTo(cx+cw,cy,cx+cw,cy+cr);
  ctx.lineTo(cx+cw,cy+ch-cr);ctx.quadraticCurveTo(cx+cw,cy+ch,cx+cw-cr,cy+ch);
  ctx.lineTo(cx+cr,cy+ch);ctx.quadraticCurveTo(cx,cy+ch,cx,cy+ch-cr);
  ctx.lineTo(cx,cy+cr);ctx.quadraticCurveTo(cx,cy,cx+cr,cy);ctx.closePath();
  ctx.stroke();

  // 6. Subtitle text (outside capsule, on background)
  if (chunk.text_subtitles) {
    var ss = parseFloat(gS('subtitle_size'));
    var sp = gS('subtitle_position');
    ctx.font = ss * sf + "px Arial, sans-serif";
    ctx.fillStyle = gS('subtitle_color');
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 4 * sf;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var sy = sp === 'top' ? H * 0.08 : sp === 'center' ? H * 0.5 : H - 30 * sf;
    var txt = chunk.text_subtitles.substring(0, 48);
    ctx.fillText(txt + (chunk.text_subtitles.length > 48 ? '...' : ''), W/2, sy);
    ctx.shadowBlur = 0;
  }

  // 7. Scene title — alternating haut (pair) / droite (impair)
  if (gS('world_title_visible') && chunk.state_name) {
    var ts = parseFloat(gS('world_title_size'));
    var tg = parseFloat(gS('world_title_gap') || 20);
    var isAbove = !isTitleRight;
    ctx.font = 'bold ' + Math.max(ts * sf, 10) + "px Georgia, serif";
    ctx.fillStyle = gS('world_title_color');
    ctx.shadowColor = 'rgba(0,0,0,0.85)';
    ctx.shadowBlur = 6 * sf;
    if (isAbove) {
      // HAUT — centré au-dessus de la capsule
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(chunk.state_name, cx + cw/2, cy - tg * sf);
    } else {
      // DROITE — aligné à droite de la capsule, centré verticalement
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(chunk.state_name, cx + cw + tg * sf, cy + ch/2);
    }
    ctx.shadowBlur = 0;
  }

  // 8. Grain
  var grain = parseFloat(gS('grain_intensity'));
  if (grain > 0) {
    for (var i = 0; i < grain * 200; i++) {
      ctx.fillStyle = 'rgba(255,255,255,' + (Math.random() * grain * 0.15) + ')';
      ctx.fillRect(Math.random()*W, Math.random()*H, 1, 1);
    }
  }
}

// ═══ DRAW CYPHER (camera zoom/pan travel + state highlight) ═══
function drawCypherPreview(ctx, W, H, chunk, t) {
  var sf = W / 854;
  var mapStyle = gS('map_style');

  if (!chunk) {
    // No chunk — just show map background
    if (mapStyle === 'sat' && IMG_CACHE['cyphersatellite']) {
      var img0 = IMG_CACHE['cyphersatellite'];
      var s0 = Math.max(W/img0.width, H/img0.height);
      ctx.drawImage(img0, (W - img0.width*s0)/2, (H - img0.height*s0)/2, img0.width*s0, img0.height*s0);
    } else {
      ctx.fillStyle = mapStyle === 'dark' ? '#0a0a0a' : '#2a3a4a';
      ctx.fillRect(0, 0, W, H);
    }
    return;
  }

  // Travel progress
  var dur = chunk.end - chunk.start;
  var prog = Math.max(0, Math.min(1, (t - chunk.start) / dur));
  var eased = ease(prog);

  // Projection: USA bounds lon -125 to -65, lat 25 to 50
  function project(lon, lat) {
    var x = ((lon - (-125)) / 60) * W;
    var y = ((50 - lat) / 25) * H;
    return {x: x, y: y};
  }

  var fromP = project(chunk.from.lon, chunk.from.lat);
  var toP = project(chunk.to.lon, chunk.to.lat);

  // Camera center: interpolate from USA to state
  var camX = lerp(fromP.x, toP.x, eased);
  var camY = lerp(fromP.y, toP.y, eased);

  // Camera zoom: start wide (1x), end zoomed in (2.5x)
  var camZoom = lerp(1.0, 2.5, eased);

  // 1. Draw map with camera zoom/pan
  if (mapStyle === 'sat' && IMG_CACHE['cyphersatellite']) {
    var img = IMG_CACHE['cyphersatellite'];
    var iw = img.width, ih = img.height;
    // Base scale = cover
    var baseScale = Math.max(W/iw, H/ih);
    var drawScale = baseScale * camZoom;
    var dw = iw * drawScale, dh = ih * drawScale;
    // Center on camera position
    var dx = W/2 - camX * drawScale / baseScale;
    var dy = H/2 - camY * drawScale / baseScale;
    // Adjust: the image is drawn so that camX,camY maps to center of canvas
    dx = W/2 - (camX / W) * dw;
    dy = H/2 - (camY / H) * dh;
    ctx.drawImage(img, dx, dy, dw, dh);
  } else if (mapStyle === 'standard') {
    ctx.fillStyle = '#2a3a4a';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    var gridSize = 40 * sf / camZoom;
    var offsetX = (camX * camZoom) % gridSize;
    var offsetY = (camY * camZoom) % gridSize;
    for (var gx = -offsetX; gx < W; gx += gridSize) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (var gy = -offsetY; gy < H; gy += gridSize) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  } else {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(197,164,78,0.06)';
    ctx.lineWidth = 1;
    var gridSize2 = 40 * sf / camZoom;
    var offsetX2 = (camX * camZoom) % gridSize2;
    var offsetY2 = (camY * camZoom) % gridSize2;
    for (var gx = -offsetX2; gx < W; gx += gridSize2) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (var gy = -offsetY2; gy < H; gy += gridSize2) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  }

  // 2. State highlight — appears at 60% of travel, peaks at 80%, fades by 100%
  if (chunk.state_iso && chunk.action !== 'travel_out') {
    var hlStart = 0.6;
    var hlPeak = 0.8;
    var hlEnd = 1.0;
    var hlOpacity = 0;
    if (prog >= hlStart && prog <= hlPeak) {
      hlOpacity = parseFloat(gS('highlight_opacity')) * ((prog - hlStart) / (hlPeak - hlStart));
    } else if (prog > hlPeak && prog <= hlEnd) {
      hlOpacity = parseFloat(gS('highlight_opacity')) * (1 - (prog - hlPeak) / (hlEnd - hlPeak));
    }

    if (hlOpacity > 0) {
      // State position on screen (adjusted for camera zoom)
      var stateScreenX = W/2 + (toP.x - camX) * camZoom;
      var stateScreenY = H/2 + (toP.y - camY) * camZoom;
      var boxW = 90 * sf * camZoom, boxH = 70 * sf * camZoom;
      var boxX = stateScreenX - boxW / 2, boxY = stateScreenY - boxH / 2;

      // Fill
      ctx.fillStyle = gS('highlight_color');
      ctx.globalAlpha = hlOpacity * 0.4;
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.globalAlpha = 1;

      // Border with glow
      ctx.strokeStyle = gS('highlight_color');
      ctx.lineWidth = 2;
      ctx.globalAlpha = hlOpacity;
      ctx.shadowColor = gS('highlight_color');
      ctx.shadowBlur = 12 * sf;
      ctx.strokeRect(boxX, boxY, boxW, boxH);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;

      // State name label
      ctx.font = 'bold ' + (22 * sf) + "px Arial, sans-serif";
      ctx.fillStyle = '#FFFFFF';
      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur = 8 * sf;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = hlOpacity;
      ctx.fillText(chunk.state_name.toUpperCase(), stateScreenX, stateScreenY - boxH/2 - 15 * sf);
      ctx.font = 'bold ' + (14 * sf) + "px 'Courier New', monospace";
      ctx.fillStyle = '#C5A44E';
      ctx.fillText(chunk.state_iso, stateScreenX, stateScreenY - boxH/2 - 32 * sf);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }
  }

  // 3. For travel_out — show USA label at destination
  if (chunk.action === 'travel_out' && prog > 0.7) {
    var usaScreenX = W/2 + (toP.x - camX) * camZoom;
    var usaScreenY = H/2 + (toP.y - camY) * camZoom;
    var usaOpacity = Math.min(1, (prog - 0.7) / 0.2);
    ctx.font = 'bold ' + (24 * sf) + "px Arial, sans-serif";
    ctx.fillStyle = '#FFFFFF';
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 10 * sf;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = usaOpacity;
    ctx.fillText('USA', usaScreenX, usaScreenY - 20 * sf);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // 4. Info bar at top
  ctx.font = 'bold ' + (16 * sf) + "px Georgia, serif";
  ctx.fillStyle = '#C5A44E';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4 * sf;
  var infoText = chunk.action === 'travel_out' ? '🗺 Retour USA' : '🗺 Travel → ' + chunk.state_name;
  ctx.fillText(infoText, W/2, 8 * sf);
  ctx.font = (10 * sf) + "px 'Courier New', monospace";
  ctx.fillStyle = '#aaa';
  ctx.fillText(chunk.start.toFixed(1) + 's→' + chunk.end.toFixed(1) + 's · ' + Math.round(prog * 100) + '%', W/2, 28 * sf);
  ctx.shadowBlur = 0;
}

// ═══ TITLE BAR & PROGRESS ═══
function drawTitleBar(ctx, W, H) {
  var sf = W / 854;
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, 32 * sf);
  ctx.fillStyle = '#C5A44E';
  ctx.fillRect(0, 32 * sf, W, 2 * sf);
  ctx.font = 'bold ' + (14 * sf) + "px Georgia, serif";
  ctx.fillStyle = '#C5A44E';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚔ ' + gS('production_title'), 10 * sf, 18 * sf);
  ctx.font = (9 * sf) + "px 'Courier New', monospace";
  ctx.fillStyle = '#555';
  ctx.textAlign = 'right';
  ctx.fillText('CALIBAN · ' + W + '×' + H, W - 10 * sf, 18 * sf);
}

function drawProgress(ctx, W, H, sec) {
  if (!segs.length) return;
  var sf = W / 854;
  var td = totalDur();
  var el = tState[sec];
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, H - 4 * sf, W, 4 * sf);
  ctx.fillStyle = '#C5A44E';
  ctx.fillRect(0, H - 4 * sf, W * Math.min(1, el / td), 4 * sf);
}

// ═══ RENDER ═══
function renderG() {
  var cv = document.getElementById('g-cv');
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  if (!chunks.length) { ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H); return; }
  ctx.clearRect(0, 0, W, H);
  var ch = chunkAt('g', tState.g);
  if (!ch) return;
  if (ch.engine === 'gamma') drawGammaPreview(ctx, W, H, ch, tState.g);
  else drawCypherPreview(ctx, W, H, ch, tState.g);
  drawTitleBar(ctx, W, H);
  drawProgress(ctx, W, H, 'g');
}

function renderM() {
  var cv = document.getElementById('m-cv');
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  if (!chunks.length) { ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H); return; }
  ctx.clearRect(0, 0, W, H);
  var ch = chunkAt('m', tState.m);
  if (!ch) return;
  drawGammaPreview(ctx, W, H, ch, tState.m);
  drawTitleBar(ctx, W, H);
  drawProgress(ctx, W, H, 'm');
}

function renderC() {
  var cv = document.getElementById('c-cv');
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  if (!chunks.length) { ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H); return; }
  ctx.clearRect(0, 0, W, H);
  var ch = chunkAt('c', tState.c);
  if (!ch) return;
  drawCypherPreview(ctx, W, H, ch, tState.c);
  drawTitleBar(ctx, W, H);
  drawProgress(ctx, W, H, 'c');
}

function renderAll() { renderG(); renderM(); renderC(); }

  c.querySelectorAll('select').forEach(function(el) { el.addEventListener('change', function() { sS(el.dataset.k, el.value); renderAll(); }); });
  c.querySelectorAll('input[type=color]').forEach(function(el) { el.addEventListener('input', function() { sS(el.dataset.k, el.value); renderAll(); }); });
  c.querySelectorAll('input[type=checkbox]').forEach(function(el) { el.addEventListener('change', function() { sS(el.dataset.k, el.checked); renderAll(); }); });
  c.querySelectorAll('input[type=text]').forEach(function(el) { el.addEventListener('input', function() { sS(el.dataset.k, el.value); }); });
}

function buildChunkLists() {
  buildCL('g-clst', chunks);

function buildCL(id, cs) {
  var el = document.getElementById(id);
  if (!el) return;
  if (!cs.length) { el.innerHTML = '<div style="color:#555;font-size:9px">Aucun</div>'; return; }
  var h = '';
  for (var i = 0; i < cs.length; i++) {
    var c = cs[i];
    var d = c.engine === 'cypher' ? (c.action || 'travel') + ' → ' + c.state_name : c.state_name;
    h += '<div class="citem" onclick="jump(\'' + id.charAt(0) + '\',' + c.start + ')"><span class="tag ' + c.engine + '">' + c.engine.toUpperCase() + '</span>#' + c.id + ' ' + d.substring(0, 18) + '<span class="tm">' + c.start.toFixed(1) + 's</span></div>';
  }
  el.innerHTML = h;
}

function jump(sec, t) { tState[sec] = t; updateTL(sec); renderAll(); }

function togglePlay(sec) { play[sec] = !play[sec]; document.getElementById(sec + '-play').textContent = play[sec] ? '⏸' : '▶'; }
function scrub(sec) { var s = document.getElementById(sec + '-tl'); var pct = parseFloat(s.value) / 1000; tState[sec] = pct * totalDur(); updateTL(sec); renderAll(); }
function updateTL(sec) { var td = totalDur(); var s = document.getElementById(sec + '-tl'); var l = document.getElementById(sec + '-tl-txt'); if (td > 0) s.value = (tState[sec] / td) * 1000; l.textContent = tState[sec].toFixed(1) + 's / ' + td.toFixed(1) + 's'; }

function setFmt(sec, f) {
  fmt[sec] = f;
  document.getElementById(sec + '-pc').classList.toggle('act', f === 'pc');
  document.getElementById(sec + '-ip').classList.toggle('act', f === 'ip');
  var cv = document.getElementById(sec + '-cv');
  cv.width = f === 'pc' ? 854 : 480;
  cv.height = f === 'pc' ? 480 : 854;
  renderAll();
}

function loop(ts) {
  if (!lastT) lastT = ts;
  var dt = (ts - lastT) / 1000;
  lastT = ts;
  var td = totalDur();
  if (td > 0) { ['g','m','c'].forEach(function(s) { if (play[s]) { tState[s] += dt; if (tState[s] >= td) tState[s] = 0; updateTL(s); } }); }
  renderAll();
  requestAnimationFrame(loop);
}

function handleImport(e) {
  var f = e.target.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try { timing = JSON.parse(ev.target.result); init(); toast('timing.json importé — ' + chunks.length + ' chunks'); }
    catch(err) { toast('Erreur: ' + err.message); }
  };
  r.readAsText(f);
}

function validate() {
  if (!chunks.length) { toast('Importer timing.json'); return; }
  var fmt = gS('format');
  var w = fmt === 'short' ? 480 : 854;
  var h = fmt === 'short' ? 854 : 480;
  var fps = (timing && timing.meta && timing.meta.fps) || 30;
  var tf = Math.ceil(totalDur() * fps);
  var gc = {
    font_primary: gS('font_primary'), font_accent: gS('font_accent'), subtitle_size: parseInt(gS('subtitle_size')),
    subtitle_color: gS('subtitle_color'), subtitle_position: gS('subtitle_position'), subtitle_align: 'center',
    subtitle_anim_enabled: gS('subtitle_anim_enabled'), subtitle_anim_speed: parseInt(gS('subtitle_anim_speed')),
    subtitle_word_fade: parseInt(gS('subtitle_word_fade')), accent_color: gS('accent_color'),
    accent_size: parseInt(gS('accent_size')), accent_font: gS('accent_font'),
    background_type: gS('background_type'), background_color: gS('background_color'), background_scale: parseFloat(gS('background_scale')),
    grain_intensity: parseFloat(gS('grain_intensity')), vignette: gS('vignette'),
    world_scale: parseFloat(gS('world_scale')), world_next_scale: parseFloat(gS('world_next_scale')),
    world_opacity: parseFloat(gS('world_opacity')), world_next_opacity: parseFloat(gS('world_next_opacity')),
    camera_amplitude: parseInt(gS('camera_amplitude')), camera_spacing: parseInt(gS('camera_spacing')),
    world_title_visible: gS('world_title_visible'), world_title_font: gS('world_title_font'),
    world_title_size: parseInt(gS('world_title_size')), world_title_color: gS('world_title_color'),
    world_title_speed: parseInt(gS('world_title_speed')), world_title_gap: parseInt(gS('world_title_gap')),
  };
  var cc = {
    highlight_color: gS('highlight_color'), highlight_opacity: parseFloat(gS('highlight_opacity')),
    map_style: gS('map_style'), border_color: gS('border_color'), border_width: parseInt(gS('border_width')),
    subtitle_font: gS('cypher_font'), subtitle_color: gS('cypher_font_color'),
    subtitle_size: parseInt(gS('cypher_font_size')), subtitle_position: gS('cypher_subtitle_position'),
    subtitle_animation: gS('cypher_animation'), visual_scale: parseFloat(gS('cypher_visual_scale')),
  };
  var spec = { meta: { fps: fps, format: fmt === 'short' ? 'vertical' : 'horizontal', width: w, height: h, audio: 'audio_clean.mp3', title: gS('production_title'), version: '2.2', engines: ['cypher', 'gamma'], duration_seconds: totalDur(), total_frames: tf }, gamma_config: gc, cypher_config: cc, chunks: chunks };
  document.getElementById('jout').value = JSON.stringify(spec, null, 2);
  document.getElementById('jov').classList.add('show');
  document.getElementById('btnDl').disabled = false;
  validated = true;
  toast('hybrid_spec.json généré ✅ — ' + chunks.length + ' chunks');
}

function dlSpec() { if (!validated) { toast('Valider d\'abord'); return; } dlJson(); }
function cpJson() { var t = document.getElementById('jout'); t.select(); document.execCommand('copy'); toast('Copié ✅'); }
function dlJson() { var j = document.getElementById('jout').value; if (!j) { toast('Rien'); return; } var b = new Blob([j], {type: 'application/json'}); var a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'hybrid_spec.json'; a.click(); toast('Téléchargé ✅'); }

function init() {
  if (!timing) timing = EMBEDDED_TIMING;
  segs = parseSegments(timing);
  states = detectStates(segs);
  var fps = (timing.meta && timing.meta.fps) || 30;
  chunks = buildChunks(segs, states, fps);
  document.getElementById('stxt').textContent = chunks.length + ' chunks · ' + totalDur().toFixed(1) + 's';
  buildGCfg(); buildMCfg(); buildCCfg(); buildChunkLists();
  updateTL('g'); updateTL('m'); updateTL('c');
  renderAll();
}

preloadImages(function() {
  init();
  requestAnimationFrame(loop);
});
</script>
</body>
